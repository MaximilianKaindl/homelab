services:
  gitlab:
    image: ${GITLAB_IMAGE}
    container_name: gitlab
    restart: unless-stopped
    hostname: ${GITLAB_HOST}
    shm_size: 256m
    ports:
      - "${GITLAB_HTTP_PORT}:80"
      - "${GITLAB_SSH_PORT}:22"
      - "${GITLAB_REGISTRY_PORT}:5050"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        gitlab_rails['initial_root_email'] = '${GITLAB_ROOT_EMAIL}'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD}'
        gitlab_rails['time_zone'] = '${GITLAB_TIMEZONE}'
        letsencrypt['enable'] = false
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
        registry['enable'] = true
        registry_external_url '${GITLAB_EXTERNAL_URL}:5050'
        gitlab_rails['registry_enabled'] = true
        gitlab_rails['registry_host'] = '${GITLAB_HOST}'
        gitlab_rails['registry_port'] = '${GITLAB_REGISTRY_PORT}'
    volumes:
      - ${GITLAB_HOME}/config:/etc/gitlab
      - ${GITLAB_HOME}/logs:/var/log/gitlab
      - ${GITLAB_HOME}/data:/var/opt/gitlab
