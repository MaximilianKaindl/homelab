---
services:
  postgresql:
    # Pinned 2026-04-03 — update deliberately after reviewing changelog
    image: docker.io/library/postgres:16.13-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d authentik -U authentik" ]
      interval: 30s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      POSTGRES_DB: authentik
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  server:
    # Pinned 2026-04-03 — update deliberately after reviewing changelog
    image: ghcr.io/goauthentik/server:2026.2
    restart: unless-stopped
    command: server
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9000/-/health/live/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL_HOST}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL_PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: "true"
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL_FROM}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-https://auth.example.internal}
    ports:
      - "9000:9000"
      - "9443:9443"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - media:/data/media
      - ./blueprints:/blueprints/custom:ro
    networks:
      - internal
      - external

  worker:
    # Pinned 2026-04-03 — update deliberately after reviewing changelog
    image: ghcr.io/goauthentik/server:2026.2
    restart: unless-stopped
    command: worker
    user: "1000"
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL_HOST}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL_PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: "true"
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL_FROM}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-https://auth.example.internal}
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - media:/data/media
      - ./blueprints:/blueprints/custom:ro
    networks:
      - internal
      - external

volumes:
  postgres_data:
    name: auth-01_postgres_data
  media:
    name: auth-01_media

networks:
  internal:
    name: auth-01_internal
    driver: bridge
    internal: true
  external:
    name: auth-01_external
    driver: bridge
