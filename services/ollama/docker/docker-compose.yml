name: ollama

services:
  ollama:
    # Pinned 2026-04-03 - update deliberately after reviewing changelog
    image: ollama/ollama:0.20.0
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /usr/local/bin/ollama-entrypoint.sh
    environment:
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-gemma4:e4b}
      OLLAMA_EXTRA_MODELS: ${OLLAMA_EXTRA_MODELS:-qwen3.5:9b}
      OLLAMA_MODELS: /models
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ollama-models:/models
      - ./ollama-entrypoint.sh:/usr/local/bin/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
volumes:
  ollama-models:
    name: ollama-models

networks:
  ai:
    name: ai-ubuntu-01_ai
    external: true
