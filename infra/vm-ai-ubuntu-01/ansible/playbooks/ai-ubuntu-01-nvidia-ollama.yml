---
- name: Install NVIDIA drivers and container runtime for Ollama
  hosts: ai-ubuntu-01
  gather_facts: true
  become: true
  vars:
    nvidia_container_toolkit_repo_url: https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list
    nvidia_container_toolkit_key_url: https://nvidia.github.io/libnvidia-container/gpgkey

  tasks:
    - name: Ensure packages required for driver discovery and repository management are installed
      ansible.builtin.apt:
        name:
          - ubuntu-drivers-common
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Discover GPGPU-capable NVIDIA driver packages recommended by Ubuntu
      ansible.builtin.command:
        argv:
          - ubuntu-drivers
          - list
          - --gpgpu
      register: nvidia_driver_candidates
      changed_when: false

    - name: Select proprietary server driver package for Pascal-era compute workloads
      ansible.builtin.set_fact:
        nvidia_server_driver_package: >-
          {{
            (
              nvidia_driver_candidates.stdout_lines
              | map('trim')
              | select('match', '^nvidia-driver-[0-9]+-server$')
              | reject('search', '-open$')
              | sort
              | last
            )
          }}

    - name: Fail if Ubuntu does not offer a supported proprietary server driver
      ansible.builtin.assert:
        that:
          - nvidia_server_driver_package | length > 0
        fail_msg: >-
          No proprietary NVIDIA `-server` driver package was returned by
          `ubuntu-drivers list --gpgpu`. This playbook intentionally avoids the
          `-open` driver flavor because GTX 1080 Ti is a Pascal GPU and NVIDIA
          documents open kernel modules as Turing-and-newer only.

    - name: Derive matching NVIDIA package names
      ansible.builtin.set_fact:
        nvidia_driver_branch: "{{ nvidia_server_driver_package | regex_search('[0-9]+') }}"
        nvidia_server_utils_package: "nvidia-utils-{{ nvidia_server_driver_package | regex_search('[0-9]+') }}-server"

    - name: Fail if the available Ubuntu driver branch is too old for Ollama GPU support
      ansible.builtin.assert:
        that:
          - (nvidia_driver_branch | int) >= 531
        fail_msg: >-
          Ollama requires NVIDIA driver version 531 or newer, but Ubuntu only
          offered branch {{ nvidia_driver_branch }} on this host.

    - name: Install Ubuntu-recommended proprietary NVIDIA server driver and utilities
      ansible.builtin.apt:
        name:
          - "{{ nvidia_server_driver_package }}"
          - "{{ nvidia_server_utils_package }}"
        state: present
        update_cache: true
      notify: Restart Docker

    - name: Ensure APT keyring directory exists for NVIDIA container toolkit
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download NVIDIA container toolkit repository key
      ansible.builtin.get_url:
        url: "{{ nvidia_container_toolkit_key_url }}"
        dest: /tmp/nvidia-container-toolkit.asc
        mode: "0644"

    - name: Install NVIDIA container toolkit keyring
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
          - /tmp/nvidia-container-toolkit.asc
      changed_when: false

    - name: Download NVIDIA container toolkit repository definition
      ansible.builtin.get_url:
        url: "{{ nvidia_container_toolkit_repo_url }}"
        dest: /tmp/nvidia-container-toolkit.list
        mode: "0644"

    - name: Install NVIDIA container toolkit APT repository
      ansible.builtin.shell: >
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g'
        /tmp/nvidia-container-toolkit.list
        > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install NVIDIA container toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true
      notify: Restart Docker

    - name: Configure Docker to expose NVIDIA GPUs to containers
      ansible.builtin.command:
        argv:
          - nvidia-ctk
          - runtime
          - configure
          - --runtime=docker
      register: nvidia_ctk_runtime
      changed_when: >-
        'no changes' not in ((nvidia_ctk_runtime.stdout | default('')) ~ ' ' ~
        (nvidia_ctk_runtime.stderr | default('')) | lower)
      notify: Restart Docker

    - name: Check whether nvidia-smi is already available
      ansible.builtin.command:
        argv:
          - nvidia-smi
      register: nvidia_smi_check
      changed_when: false
      failed_when: false

    - name: Report post-install status
      ansible.builtin.debug:
        msg:
          - "Selected driver package: {{ nvidia_server_driver_package }}"
          - "Selected utilities package: {{ nvidia_server_utils_package }}"
          - "nvidia-smi exit code: {{ nvidia_smi_check.rc }}"
          - >-
            If nvidia-smi is not yet working, reboot the VM so the new NVIDIA
            kernel modules can load before starting Ollama containers.
          - "After reboot, validate with: nvidia-smi"
          - "Docker test: docker run --rm --gpus=all nvidia/cuda:12.9.0-base-ubuntu24.04 nvidia-smi"
          - "Ollama test: docker run -d --gpus=all -v ollama:/root/.ollama -p 11434:11434 --name ollama ollama/ollama"

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
