---
- name: Configure monitor-01 (Docker host)
  hosts: monitor
  gather_facts: true
  roles:
    - base
    - docker_host

- name: Mount monitor data disk
  hosts: monitor-01
  gather_facts: true
  tasks:
    - name: Create ext4 filesystem on data disk
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_disk_device }}"
      when: data_disk_device is defined
      ignore_errors: true

    - name: Create mount point
      ansible.builtin.file:
        path: "{{ data_disk_mount }}"
        state: directory
        mode: "0755"
      when: data_disk_mount is defined

    - name: Mount data disk
      ansible.posix.mount:
        path: "{{ data_disk_mount }}"
        src: "{{ data_disk_device }}"
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      when: data_disk_device is defined and data_disk_mount is defined

    - name: Create data subdirectories
      ansible.builtin.file:
        path: "{{ data_disk_mount }}/{{ item }}"
        state: directory
        owner: "10001"
        group: "10001"
        mode: "0755"
      loop:
        - loki
        - mimir
        - tempo

- name: Set up deploy user on monitor-01
  hosts: monitor-01
  gather_facts: false
  roles:
    - deploy_user
